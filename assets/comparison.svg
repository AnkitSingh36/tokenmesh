<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" width="720" height="300">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .title { fill: #111; font-size: 13px; font-weight: 600; }
  .lbl { fill: #333; font-size: 11px; text-anchor: end; dominant-baseline: middle; }
  .pct-lbl { fill: #333; font-size: 11px; dominant-baseline: middle; }
  .note { fill: #888; font-size: 9.5px; dominant-baseline: middle; }
  .grid { stroke: #e8e6e0; stroke-width: 1; }
  .axis { stroke: #ccc; stroke-width: 1; }
</style>
<rect width="720" height="300" fill="#fafaf7" rx="8"/>
<text x="360" y="28" class="title" text-anchor="middle">TokenMesh vs Alternatives — Token Reduction % (Real-World Prompts)</text>
<text x="360" y="42" fill="#999" font-size="9.5" text-anchor="middle" font-family="-apple-system,sans-serif">Higher is better</text>
<line x1="200.0" y1="50" x2="200.0" y2="264" class="grid"/>
<text x="200.0" y="280" fill="#aaa" font-size="10" text-anchor="middle" font-family="-apple-system,sans-serif">0%</text>
<line x1="264.6" y1="50" x2="264.6" y2="264" class="grid"/>
<text x="264.6" y="280" fill="#aaa" font-size="10" text-anchor="middle" font-family="-apple-system,sans-serif">10%</text>
<line x1="329.2" y1="50" x2="329.2" y2="264" class="grid"/>
<text x="329.2" y="280" fill="#aaa" font-size="10" text-anchor="middle" font-family="-apple-system,sans-serif">20%</text>
<line x1="393.8" y1="50" x2="393.8" y2="264" class="grid"/>
<text x="393.8" y="280" fill="#aaa" font-size="10" text-anchor="middle" font-family="-apple-system,sans-serif">30%</text>
<line x1="458.5" y1="50" x2="458.5" y2="264" class="grid"/>
<text x="458.5" y="280" fill="#aaa" font-size="10" text-anchor="middle" font-family="-apple-system,sans-serif">40%</text>
<line x1="523.1" y1="50" x2="523.1" y2="264" class="grid"/>
<text x="523.1" y="280" fill="#aaa" font-size="10" text-anchor="middle" font-family="-apple-system,sans-serif">50%</text>
<line x1="587.7" y1="50" x2="587.7" y2="264" class="grid"/>
<text x="587.7" y="280" fill="#aaa" font-size="10" text-anchor="middle" font-family="-apple-system,sans-serif">60%</text>
<line x1="200" y1="50" x2="200" y2="264" class="axis"/>
<rect x="200" y="50.0" width="368.3" height="25.4" fill="#1a5c3a" rx="2"/>
<text x="192" y="62.7" class="lbl">TokenMesh Aggressive</text>
<text x="574.3" y="59.7" class="pct-lbl">57%</text>
<text x="574.3" y="71.7" class="note">neural · meaning-safe ✓</text>
<rect x="200" y="81.4" width="239.1" height="25.4" fill="#52a47a" rx="2"/>
<text x="192" y="94.1" class="lbl">TokenMesh Lite</text>
<text x="445.1" y="91.1" class="pct-lbl">37%</text>
<text x="445.1" y="103.1" class="note">neural · conservative ✓</text>
<rect x="200" y="112.9" width="193.8" height="25.4" fill="#6b8cba" rx="2"/>
<text x="192" y="125.6" class="lbl">TokenMesh Browser</text>
<text x="399.8" y="122.6" class="pct-lbl">30%</text>
<text x="399.8" y="134.6" class="note">TF-IDF · live-measured ✅</text>
<rect x="200" y="144.3" width="284.3" height="25.4" fill="#b8860b" rx="2"/>
<text x="192" y="157.0" class="lbl">LLMLingua</text>
<text x="490.3" y="154.0" class="pct-lbl">44%</text>
<text x="490.3" y="166.0" class="note">drops tokens mid-sentence</text>
<rect x="200" y="175.7" width="245.5" height="25.4" fill="#888780" rx="2"/>
<text x="192" y="188.4" class="lbl">Graphify</text>
<text x="451.5" y="185.4" class="pct-lbl">38%</text>
<text x="451.5" y="197.4" class="note">73% claim = FAQ text only</text>
<rect x="200" y="207.1" width="161.5" height="25.4" fill="#b0aba2" rx="2"/>
<text x="192" y="219.9" class="lbl">LangChain trim</text>
<text x="367.5" y="216.9" class="pct-lbl">25%</text>
<text x="367.5" y="228.9" class="note">simple truncation</text>
<rect x="200" y="238.6" width="323.1" height="25.4" fill="#c5341e" rx="2"/>
<text x="192" y="251.3" class="lbl">Naive truncation</text>
<text x="529.1" y="248.3" class="pct-lbl">50%</text>
<text x="529.1" y="260.3" class="note">destroys tail content</text>
</svg>